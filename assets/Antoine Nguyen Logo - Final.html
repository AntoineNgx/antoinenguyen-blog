<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Antoine Nguyen — Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Geist", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #f5f3ee;
    color: #111111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 96px;
  }

  .logo {
    font-weight: 900;
    font-size: 96px;
    line-height: 1.02;
    text-align: left;
    color: #111111;
  }
  .logo > span { display: block; }
  .logo .line-1 { letter-spacing: 0.22em; }
  .logo .line-2 { letter-spacing: 0.3394em; } /* tuned so NGUYEN matches ANTOINE width */
</style>
</head>
<body>

<div class="logo">
  <span class="line-1">ANTOINE</span>
  <span class="line-2">NGUYEN</span>
</div>

</body>
</html>
