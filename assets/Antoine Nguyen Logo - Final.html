<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Antoine Nguyen — Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Geist", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #f5f3ee;
    color: #111111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 28px;
    color: #111111;
  }
  .logo .mono {
    font-weight: 900;
    font-size: 140px;
    line-height: 0.82;
    letter-spacing: -0.05em;
    padding-right: 28px;
    border-right: 3px solid currentColor;
  }
  .logo .stack {
    font-weight: 800;
    font-size: 36px;
    line-height: 1.05;
    letter-spacing: 0.24em;
  }
  .logo .stack > span { display: block; }
</style>
</head>
<body>

<div class="logo" id="logo">
  <div class="mono">AN</div>
  <div class="stack">
    <span>ANTOINE</span>
    <span>NGUYEN</span>
  </div>
</div>

</body>
</html>
